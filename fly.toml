app = "minddiff"
primary_region = "nrt"

[build]

[env]
  DATABASE_URL = "sqlite:////data/minddiff.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "minddiff_data"
  destination = "/data"
