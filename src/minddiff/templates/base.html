<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MindDiff{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'surface-bg': '#F5F3EF',
            'surface-dim': '#EDE9E3',
            'surface-border': '#DDD8D0',
            'brand': { DEFAULT: '#2D3142', accent: '#5046E5', light: '#E8E7FE', muted: '#7A7990' },
            'align': { DEFAULT: '#0D9488', light: '#CCFBF1', surface: '#F0FDFA' },
            'diverge': { DEFAULT: '#D97706', light: '#FEF3C7', surface: '#FFFBEB' },
            'critical': { DEFAULT: '#DC2626', light: '#FEE2E2', surface: '#FEF2F2' },
          },
        },
      },
    }
  </script>

  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #F5F3EF;
      color: #1A1A1A;
    }
    .font-display { font-family: 'Shippori Mincho B1', serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .anim-fade-up { animation: fadeUp 0.45s ease-out both; }
    .anim-fade-in { animation: fadeIn 0.3s ease-out both; }
    .stagger-1 { animation-delay: 0.04s; }
    .stagger-2 { animation-delay: 0.08s; }
    .stagger-3 { animation-delay: 0.12s; }
    .stagger-4 { animation-delay: 0.16s; }
    .stagger-5 { animation-delay: 0.20s; }

    /* Card */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(45,49,66,.05), 0 1px 2px rgba(45,49,66,.03);
      transition: box-shadow 0.2s;
    }

    /* Gauge circle (SVG based) */
    .gauge-track { stroke: #EDE9E3; }
    .gauge-fill {
      transition: stroke-dasharray 1s ease-out;
      stroke-linecap: round;
    }

    /* Dimension badge */
    .dim-badge {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 0.7rem;
      width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 6px; flex-shrink: 0;
    }

    /* htmx */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { display: inline-flex; }

    /* Save status */
    .save-status { transition: opacity 0.3s, color 0.3s; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #DDD8D0; border-radius: 3px; }

    /* Radar label */
    .radar-label {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      fill: #7A7468;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: -1;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen">
  {% block nav %}
  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-surface-border">
    <div class="max-w-3xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/" class="font-display text-xl font-bold tracking-tight">
        <span class="text-brand">Mind</span><span class="text-brand-accent">Diff</span>
      </a>
      {% block nav_right %}{% endblock %}
    </div>
  </nav>
  {% endblock %}

  <main class="max-w-3xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
